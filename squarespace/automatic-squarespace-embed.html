<!-- Kerr Team Home Days to Sell — Fully Automatic Squarespace Embed -->
<!-- Replace YOUR_GITHUB_USERNAME and YOUR_REPOSITORY_NAME after you publish the data repo with GitHub Pages. -->
<div id="kerr-days-to-sell-app"></div>
<style>
  #kerr-days-to-sell-app{font-family:Inter,Arial,sans-serif;color:#0f172a;background:linear-gradient(180deg,#f8fafc,#fff);border:1px solid #e2e8f0;border-radius:24px;overflow:hidden;box-shadow:0 20px 40px rgba(15,23,42,.08)}
  .kdts-wrap{padding:28px}.kdts-hero{background:#0f172a;color:white;border-radius:22px;padding:28px;margin-bottom:22px}.kdts-kicker{color:#cbd5e1;text-transform:uppercase;letter-spacing:.08em;font-size:12px;font-weight:800}.kdts-title{font-size:clamp(28px,4vw,48px);line-height:1.05;margin:10px 0;font-weight:900}.kdts-sub{color:#dbeafe;font-size:17px;line-height:1.6;max-width:850px}.kdts-controls{display:flex;gap:12px;flex-wrap:wrap;margin:20px 0}.kdts-search{flex:1;min-width:240px;padding:15px 16px;border-radius:16px;border:1px solid #cbd5e1;font-size:16px}.kdts-btn{border:1px solid #cbd5e1;background:white;border-radius:999px;padding:12px 16px;font-weight:800;cursor:pointer}.kdts-btn.active{background:#0f172a;color:white}.kdts-status{font-size:13px;color:#64748b;margin-bottom:16px}.kdts-grid{display:grid;gap:16px}.kdts-card{background:white;border:1px solid #e2e8f0;border-radius:22px;padding:20px}.kdts-top{display:flex;justify-content:space-between;gap:14px;flex-wrap:wrap}.kdts-market{font-size:25px;font-weight:900}.kdts-cities{color:#64748b;margin-top:4px;font-size:14px;line-height:1.5}.kdts-badge{border-radius:999px;padding:7px 11px;font-size:13px;font-weight:900;border:1px solid}.kdts-Fast{background:#ecfdf5;color:#047857;border-color:#a7f3d0}.kdts-Normal{background:#eff6ff;color:#1d4ed8;border-color:#bfdbfe}.kdts-Slower{background:#fffbeb;color:#b45309;border-color:#fde68a}.kdts-stats{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;margin:18px 0}.kdts-stat{background:#f8fafc;border-radius:18px;padding:16px}.kdts-label{font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:#64748b;font-weight:900}.kdts-value{font-size:30px;font-weight:950;margin-top:4px}.kdts-insight{background:#f1f5f9;border-radius:18px;padding:15px;line-height:1.55;color:#334155}.kdts-footer{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;border-top:1px solid #e2e8f0;margin-top:18px;padding-top:16px;color:#64748b;font-size:13px}.kdts-cta{margin-top:22px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:22px;padding:22px;display:grid;gap:12px}.kdts-cta h3{font-size:24px;margin:0;font-weight:950}.kdts-cta p{margin:0;color:#475569;line-height:1.6}.kdts-cta a{display:inline-block;background:#0f172a;color:#fff;text-decoration:none;border-radius:999px;padding:13px 18px;font-weight:900;width:max-content}.kdts-error{background:#fff7ed;border:1px solid #fed7aa;color:#9a3412;border-radius:18px;padding:15px;margin-bottom:16px}.kdts-empty{text-align:center;background:#fff;border:1px dashed #cbd5e1;border-radius:22px;padding:30px;color:#64748b}@media(max-width:720px){.kdts-wrap{padding:18px}.kdts-stats{grid-template-columns:1fr}.kdts-hero{padding:22px}.kdts-controls{display:block}.kdts-search{width:100%;box-sizing:border-box;margin-bottom:10px}.kdts-btn{margin:3px 2px}}
</style>
<script>
(function(){
  const DATA_URL = "https://YOUR_GITHUB_USERNAME.github.io/YOUR_REPOSITORY_NAME/market-data.json";
  const fallbackData = {generatedAt:new Date().toISOString(),brand:{shortName:"Kerr Team",phone:"330-3000",textKeyword:"VALUE",website:"kerrteam.com"},metric:"Median Days on Market",note:"Fallback demo data. Connect DATA_URL for automatic updates.",markets:[{marketName:"Oklahoma City Metro",state:"OK",cities:["Oklahoma City","Norman","Edmond","Moore","Noble","Tuttle","Yukon","Mustang"],medianDaysOnMarket:51,previousYearDaysOnMarket:null,previousMonthDaysOnMarket:54,latestMonthLabel:"April 2026",speed:"Normal",insight:"The Oklahoma City Metro is moving at a more normal pace. Sellers should expect buyers to compare price, condition, and value carefully.",sourceName:"FRED / Realtor.com Housing Inventory",sourceUrl:"https://fred.stlouisfed.org/series/MEDDAYONMAR36420"}]};
  const root = document.getElementById('kerr-days-to-sell-app');
  let data = fallbackData; let query = ''; let filter = 'All'; let usingFallback = false;
  function esc(s){return String(s ?? '').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));}
  function trendText(m){ if(m.previousYearDaysOnMarket==null) return m.previousMonthDaysOnMarket?`${Math.abs(m.medianDaysOnMarket-m.previousMonthDaysOnMarket)} days ${m.medianDaysOnMarket>m.previousMonthDaysOnMarket?'slower':'faster'} than last month`:'Latest public monthly reading'; const diff=m.medianDaysOnMarket-m.previousYearDaysOnMarket; if(diff>0)return `${diff} days slower than last year`; if(diff<0)return `${Math.abs(diff)} days faster than last year`; return 'Same pace as last year'; }
  function cityMatch(m,q){ const text=[m.marketName,m.state,...(m.cities||[])].join(' ').toLowerCase(); return !q || text.includes(q.toLowerCase()); }
  function render(){
    const brand=data.brand||fallbackData.brand;
    const markets=(data.markets||[]).filter(m=>cityMatch(m,query)&&(filter==='All'||m.speed===filter));
    root.innerHTML=`<div class="kdts-wrap"><section class="kdts-hero"><div class="kdts-kicker">${esc(brand.shortName||'Kerr Team')} Seller Market Tool</div><div class="kdts-title">How long are homes taking to sell?</div><div class="kdts-sub">Search your city to see the latest automated public monthly median-days-on-market reading, then request a custom timeline for your home.</div></section>${usingFallback?`<div class="kdts-error"><strong>Setup needed:</strong> This is showing fallback demo data because the live market-data.json file is not connected yet.</div>`:''}<div class="kdts-controls"><input class="kdts-search" id="kdts-search" placeholder="Search Norman, Edmond, Oklahoma City..." value="${esc(query)}"><button class="kdts-btn ${filter==='All'?'active':''}" data-filter="All">All</button><button class="kdts-btn ${filter==='Fast'?'active':''}" data-filter="Fast">Fast</button><button class="kdts-btn ${filter==='Normal'?'active':''}" data-filter="Normal">Normal</button><button class="kdts-btn ${filter==='Slower'?'active':''}" data-filter="Slower">Slower</button></div><div class="kdts-status">Showing ${markets.length} market result${markets.length===1?'':'s'} · Updated ${esc(new Date(data.generatedAt).toLocaleString())} · ${esc(data.metric||'Median Days on Market')}</div><div class="kdts-grid">${markets.length?markets.map(m=>`<article class="kdts-card"><div class="kdts-top"><div><div class="kdts-market">${esc(m.marketName)}, ${esc(m.state)}</div><div class="kdts-cities">Cities covered: ${esc((m.cities||[]).slice(0,12).join(', '))}${(m.cities||[]).length>12?'...':''}</div></div><div class="kdts-badge kdts-${esc(m.speed)}">${esc(m.speed)} Market</div></div><div class="kdts-stats"><div class="kdts-stat"><div class="kdts-label">Median DOM</div><div class="kdts-value">${esc(m.medianDaysOnMarket)}</div><div>days</div></div><div class="kdts-stat"><div class="kdts-label">Comparison</div><div class="kdts-value" style="font-size:18px;line-height:1.25">${esc(trendText(m))}</div></div><div class="kdts-stat"><div class="kdts-label">Data Month</div><div class="kdts-value" style="font-size:20px">${esc(m.latestMonthLabel||m.latestMonth||'Latest')}</div></div></div><div class="kdts-insight">${esc(m.insight)}</div><div class="kdts-footer"><span>Source: <a href="${esc(m.sourceUrl)}" target="_blank" rel="noopener">${esc(m.sourceName)}</a></span><span>City searches may map to metro-level public data.</span></div></article>`).join(''):`<div class="kdts-empty">No matching city found. Try Norman, Oklahoma City, Edmond, Moore, Yukon, Mustang, Tulsa, or Lawton.</div>`}</div><section class="kdts-cta"><h3>Want a custom timeline for your home?</h3><p>City averages are helpful, but your home’s actual selling timeline depends on price, condition, location, competition, and marketing.</p><a href="sms:${esc(brand.phone||'330-3000')}?body=${encodeURIComponent(brand.textKeyword||'VALUE')}">Text ${esc(brand.textKeyword||'VALUE')} to ${esc(brand.phone||'330-3000')}</a></section></div>`;
    root.querySelector('#kdts-search').addEventListener('input',e=>{query=e.target.value;render();});
    root.querySelectorAll('[data-filter]').forEach(btn=>btn.addEventListener('click',()=>{filter=btn.getAttribute('data-filter');render();}));
  }
  fetch(DATA_URL,{cache:'no-store'}).then(r=>{if(!r.ok)throw new Error('Data not found');return r.json();}).then(json=>{data=json;usingFallback=false;render();}).catch(()=>{data=fallbackData;usingFallback=true;render();});
  render();
})();
</script>
